- title: Oval — Opinion Variable Annotator
  description: >-
    An analytical tool for examining Pol.is-style crowdsourced opinion data.
    Define variables of interest, then use human-annotated "anchor" comments to
    approximate those values across all participants — building on top of Polis
    voting pattern analysis.
  image: assets/labs-oval-demo.png
  url: https://patcon.github.io/oval-demo/
  status: React App

- title: Polis Report Processor
  description: >-
    A streamlit app for taking any polis report URL, running some
    valency-anndata processing, and exporting results as an h5ad export. Basic
    form fields allow customizing the data processing.
  image: assets/labs-polis-report-processor.png
  url: https://valency-anndata-export-test.streamlit.app/
  status: Streamlit App

- title: Perspective Map Explorer v2
  description: >-
    Like Google Maps, Polis, and MS Paint had a love-child. Allows exploring
    h5ad data exports produced by valency-anndata. Paint groups with colors,
    then click colors to view statements that differentiate groups. Or animate
    between different dimensional reduction projects, and view any participant
    data layer you've created.
  image: https://raw.githubusercontent.com/patcon/polislike-human-cartography-prototype-v2/main/public/screenshot.png
  url: https://patcon.github.io/polislike-human-cartography-prototype-v2/#perspective-explorer
  status: React App

- title: Semantic Statement Map Creator
  description: >-
    A streamlit app that uses the Polis 2.0 pipeline for generating explorable
    semantic maps of conversation statements. All you need is a Polis report
    URL. Simple translation via Google Translate. Uses DataMapPlot
    visualization library.
  image: assets/labs-streamlit-semantic-map.png
  url: https://polis2-from-report.streamlit.app/
  status: Streamlit App

- title: Exploring Participant Engagement Metrics
  description: >-
    Visualize participant engagement time and number of unique activity
    sessions on the perspective map projections. These might be added as future
    helper methods in valency-anndata.
  image: assets/labs-participant-engagement-notebook.png
  url: https://colab.research.google.com/drive/1HNIomcEka0bXTO5emQOWtxv9zuPpu2Vs#scrollTo=eHSRiUvk7Sn5
  status: Python Notebook

- title: Vote Heatmaps and Clusters
  description: >-
    Visualize Polis vote matrices as heatmaps with participants grouped by
    various clusterings like KMeans or Leiden. Visually compare how structure
    of this data compares between detected groups.
  image: assets/labs-vote-heatmaps-and-clusters.png
  url: https://colab.research.google.com/drive/1r3x3zll6pxoXJKTBMmJ6l7yFmiH5APnD
  status: Python Notebook

- title: Custom Notebook Tools via Anywidget
  description: >-
    Embed custom interactive react components directly in Colab notebooks using
    anywidget. A proof-of-concept for building bespoke exploration widgets
    alongside valency-anndata analysis outputs.
  image: assets/labs-anywidget-custom-tools.png
  url: https://colab.research.google.com/drive/1PNlxdBiZbgfoSQke6KEcssIQahyE7dyz
  status: Python Notebook
